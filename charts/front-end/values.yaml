replicaCount: 1

image:
  repository: weaveworksdemos/front-end
  tag: "0.3.12"
  pullPolicy: IfNotPresent

service:
  type: LoadBalancer
  port: 80
  targetPort: 8079

resources:
  limits:
    cpu: 300m
    memory: 1000Mi
  requests:
    cpu: 100m
    memory: 300Mi

env:
  - name: SESSION_REDIS
    value: "true"

securityContext:
  runAsNonRoot: true
  runAsUser: 10001
  readOnlyRootFilesystem: false

livenessProbe:
  httpGet:
    path: /
    port: 8079
  initialDelaySeconds: 30
  periodSeconds: 10
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /
    port: 8079
  initialDelaySeconds: 10
  periodSeconds: 5

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

nodeSelector: {}
tolerations: []
affinity: {}

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8079"
