apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: orders-db
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  labels:
    app.kubernetes.io/name: orders-db
    app.kubernetes.io/part-of: sock-shop
spec:
  project: sock-shop
  source:
    repoURL: https://github.com/YOUR_ORG/sock-shop-gitops.git
    targetRevision: HEAD
    path: charts/orders-db
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: sock-shop
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - Validate=true
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 1m
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
