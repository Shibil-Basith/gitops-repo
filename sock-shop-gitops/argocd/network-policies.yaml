# NetworkPolicies for Sock Shop
# Apply this manually or add to argocd bootstrap
---
# Default deny all ingress
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: sock-shop
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
# Allow front-end to receive external traffic
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-front-end-ingress
  namespace: sock-shop
spec:
  podSelector:
    matchLabels:
      name: front-end
  policyTypes:
    - Ingress
  ingress:
    - {}  # Allow all ingress to front-end (LoadBalancer)
---
# Allow front-end to reach backend services
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-front-end-to-services
  namespace: sock-shop
spec:
  podSelector:
    matchLabels:
      name: catalogue
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              name: front-end
      ports:
        - port: 80
