apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana-lite
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: grafana
    targetRevision: "*"
    helm:
      parameters:
        - name: service.type
          value: NodePort
        - name: service.nodePort
          value: "30091"
        - name: adminPassword
          value: admin
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
