apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentinel-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: db
  template:
    metadata:
      labels:
        app: db
    spec:
      containers:
      - name: db
        image: postgres:15-alpine
        env:
        - name: POSTGRES_PASSWORD
          value: "password123" # In prod, use a SealedSecret here
        - name: POSTGRES_USER
          value: "admin"
        - name: POSTGRES_DB
          value: "logs_db"
---
apiVersion: v1
kind: Service
metadata:
  name: db
spec:
  ports:
  - port: 5432
  selector:
    app: db
