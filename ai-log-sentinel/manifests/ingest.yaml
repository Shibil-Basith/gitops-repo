apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentinel-ingest
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ingest
  template:
    metadata:
      labels:
        app: ingest
    spec:
      containers:
      - name: ingest
        image: shibilbasithcp/sentinel-ingest:latest
        env:
        - name: REDIS_HOST
          value: "redis"
---
apiVersion: v1
kind: Service
metadata:
  name: ingest-service
spec:
  type: NodePort
  ports:
  - port: 8000
    nodePort: 30001 # Access externally via this port
  selector:
    app: ingest
